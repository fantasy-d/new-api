# New-API Docker Compose Configuration (External MySQL on Same Host)
version: '3.4'

services:
  new-api:
    image: new-api:ecs
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "8123:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 连接宿主机上的 MySQL，默认端口 3306
      - SQL_DSN=root:804617@tcp(host.docker.internal:3306)/new-api?parseTime=true&loc=Local
      - REDIS_CONN_STRING=redis://redis
      - SESSION_SECRET=20260418133641707250508268d9d6sTc8jhRk
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
    depends_on:
      - redis
    networks:
      - new-api-network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - new-api-network

networks:
  new-api-network:
    driver: bridge
